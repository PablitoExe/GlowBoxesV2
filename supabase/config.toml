# Supabase local dev config — required by the CLI.
# The project_id must match your Supabase project reference.
[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "https://glowboxes.com.ar"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 6

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[functions.send-email]
verify_jwt = false

[functions.mp-create-preference]
verify_jwt = false   # function handles JWT verification internally

[functions.mp-webhook]
verify_jwt = false   # public webhook — validated via HMAC-SHA256 signature
